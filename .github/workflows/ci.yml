name: CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CCACHE_DIR: ~/.cache/ccache
  CCACHE_REMOTE_STORAGE: "http://buildcache.cyber.gent/|layout=bazel"
  CCACHE_RESHARE: "true"
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: "true"
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.job }}-v1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          if apt-cache show libwxgtk3.2-dev >/dev/null 2>&1; then
            WX_PKG="libwxgtk3.2-dev"
          else
            WX_PKG="libwxgtk3.0-gtk3-dev"
          fi
          sudo apt-get install -y \
            ccache \
            cmake \
            ninja-build \
            g++ \
            "$WX_PKG"

      - name: Prime ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: Configure
        run: cmake -S . -B build/linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/linux --config Release

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-explorer-linux
          path: build/linux/csv-explorer

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.job }}-v1

      - name: Install build tools
        run: brew install ccache ninja

      - name: Prime ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: Configure
        run: cmake -S . -B build/macos -G Ninja

      - name: Build
        run: cmake --build build/macos

      - name: Package
        run: cmake --build build/macos --target package

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-explorer-macos-dmg
          path: build/macos/*.dmg

  windows-mingw:
    name: Windows (MinGW cross, Ubuntu container)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.job }}-v1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            cmake \
            ninja-build \
            g++-mingw-w64-x86-64 \
            xz-utils \
            mingw-w64

      - name: Prime ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: Configure (MinGW preset)
        run: cmake --preset windows-mingw64 --fresh

      - name: Build (Windows executable)
        run: cmake --build --preset windows-mingw64 --config Release

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-explorer-windows
          path: build/windows-mingw64/csv-explorer.exe

  release-windows:
    name: Publish Windows binary on tag
    if: startsWith(github.ref, 'refs/tags/')
    needs: windows-mingw
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: csv-explorer-windows
          path: dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/csv-explorer.exe
