name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          if apt-cache show libwxgtk3.2-dev >/dev/null 2>&1; then
            WX_PKG="libwxgtk3.2-dev"
          else
            WX_PKG="libwxgtk3.0-gtk3-dev"
          fi
          sudo apt-get install -y \
            cmake \
            make \
            g++ \
            "$WX_PKG"

      - name: Configure
        run: cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/linux --config Release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxcsv-linux
          path: build/linux/wxCsv

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/macos

      - name: Build
        run: cmake --build build/macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxcsv-macos
          path: build/macos/wxCsv.app

  windows-mingw:
    name: Windows (MinGW cross, Ubuntu container)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            make \
            g++-mingw-w64-x86-64 \
            xz-utils \
            mingw-w64

      - name: Configure (MinGW preset)
        run: cmake --preset windows-mingw64 --fresh

      - name: Build (Windows executable)
        run: cmake --build --preset windows-mingw64 --config Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxcsv-windows
          path: build/windows-mingw64/wxCsv.exe

  release-windows:
    name: Publish Windows binary on tag
    if: startsWith(github.ref, 'refs/tags/')
    needs: windows-mingw
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: wxcsv-windows
          path: dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wxCsv.exe
